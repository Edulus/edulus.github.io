<!-- Updated index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edward Kasimir - Launch Page</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="layout.css" />
    <link rel="stylesheet" href="animation.css" />
  </head>
  <body>
    <div class="container">
      <div class="button-wrapper" id="button1Wrapper">
        <a
          href="https://edulus.github.io/Close-Encounters-with-5-Tones/"
          class="button"
          id="button1"
        ></a>
        <div class="tooltip">Close Encounters with 5 Tones</div>
      </div>
      <div class="button-wrapper" id="button2Wrapper">
        <a href="https://edulus.github.io/Swirling-Cosmic-Egg/" class="button" id="button2"></a>
        <div class="tooltip">Swirling Cosmic Egg</div>
      </div>
      <div class="button-wrapper" id="button3Wrapper">
        <a href="https://edulus.github.io/Space-Sounds-Generator/" class="button" id="button3"></a>
        <div class="tooltip">Space Sounds Generator</div>
      </div>
      <div class="button-wrapper" id="button4Wrapper">
        <a
          href="https://edulus.github.io/Ethereal_Chord_Generator/"
          class="button"
          id="button4"
        ></a>
        <div class="tooltip">Ethereal Chord Generator</div>
      </div>
      <div class="button-wrapper" id="button5Wrapper">
        <a href="https://edulus.github.io/YT-DLP_Web_Interface/" class="button" id="button5"></a>
        <div class="tooltip">YouTube Audio Extractor</div>
      </div>
      <div class="button-wrapper" id="button6Wrapper">
        <a href="https://edulus.github.io/space-pong/" class="button" id="button6"></a>
        <div class="tooltip">Space Pong</div>
      </div>
      <div class="button-wrapper" id="button7Wrapper">
        <a href="https://edulus.github.io/camp-location-chooser/" class="button" id="button7">
          <img src="https://raw.githubusercontent.com/Edulus/camp-location-chooser/main/3D%20SideBurn%20Logo.png" alt="Camp Location Chooser" />
        </a>
        <div class="tooltip">Camp Location Chooser</div>
      </div>
    </div>
    <script src="mesh-audio.js"></script>
    <script src="background.js"></script>
    <script src="layout.js"></script>
    <script src="animation.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const musicalMesh = new MusicalMesh();
        const background = new BackgroundField({ musicalMesh });
        const layout = new Layout();
        const animation = new Animation(layout);
        const instrumentSelector = new InstrumentSelector(musicalMesh);

        // Browsers require a user gesture before AudioContext can start.
        // Any click anywhere — including on a project button — starts/resumes audio.
        document.addEventListener("click", (e) => {
          musicalMesh.start();
          // Project-button clicks should navigate, not retune the mesh.
          if (e.target.closest(".button")) return;
          // Instrument-slot clicks change the timbre, not the key.
          if (e.target.closest(".instrument-slot")) return;
          // Grid click → set new key/octave and play a chord at that location
          const w = window.innerWidth;
          const h = window.innerHeight;
          musicalMesh.setAnchor(e.clientX, e.clientY, w, h);
          background.flashAt(e.clientX, e.clientY);
          musicalMesh.retriggerAt(background.cyanDots, e.clientX, e.clientY, w, h);
        });
      });
    </script>
  </body>
</html>
